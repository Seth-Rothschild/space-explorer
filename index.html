<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Explorer!</title>
    <style>
        * { box-sizing: border-box; }

        body {
            background: #02040E;
            margin: 0;
            padding: 10px 14px;
            font-family: Arial, sans-serif;
            color: #EEE;
            min-height: 100vh;
        }

        h1 {
            color: #FFD700;
            font-size: 26px;
            margin: 0 0 8px;
            letter-spacing: 3px;
            text-shadow: 0 0 20px #FF8C00, 0 0 6px #FFD700;
            text-align: center;
        }

        .layout {
            display: flex;
            gap: 12px;
            align-items: flex-start;
            justify-content: center;
        }

        .canvas-side {
            display: flex;
            flex-direction: column;
            align-items: stretch;
            flex: 1;
            min-width: 0;
        }

        canvas {
            display: block;
            border-radius: 10px;
            border: 2px solid #1A2040;
        }

        #fact-panel {
            display: flex;
            visibility: hidden;
            flex-direction: row;
            align-items: flex-start;
            gap: 20px;
            background: rgba(5, 8, 28, 0.92);
            border: 1px solid #2A3560;
            border-top: none;
            border-radius: 0 0 10px 10px;
            padding: 14px 18px;
        }

        #fact-header {
            flex-shrink: 0;
            width: 220px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 5px;
        }

        #fact-name {
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 2px;
            line-height: 1.1;
        }

        #fact-type {
            font-size: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #4D6490;
        }

        #origin-toggle {
            display: none;
        }

        #fact-origin {
            font-size: 12px;
            line-height: 1.5;
            color: #7080A8;
            font-style: italic;
        }

        #fact-origin a,
        #fact-text a {
            color: #5878A8;
            text-decoration: none;
        }

        #fact-origin a:hover,
        #fact-text a:hover { text-decoration: underline; }

        #fact-next {
            background: rgba(80, 100, 180, 0.3);
            border: 1px solid rgba(100, 130, 220, 0.5);
            color: #AAC0FF;
            padding: 4px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }

        #fact-next:hover { background: rgba(80, 100, 180, 0.5); }

        #fact-body {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
            min-width: 0;
            padding-top: 2px;
        }

        #fact-text {
            font-size: 18px;
            line-height: 1.55;
            color: #C8D4EE;
            word-wrap: break-word;
        }

        #meta-panel {
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            gap: 0;
            border-top: 1px solid #1A2440;
            padding-top: 8px;
        }

        .meta-chip {
            display: flex;
            align-items: baseline;
            gap: 5px;
            padding-right: 14px;
            margin-right: 14px;
            border-right: 1px solid #1A2440;
        }

        .meta-chip:last-child {
            padding-right: 0;
            margin-right: 0;
            border-right: none;
        }

        .meta-label {
            color: #4D6490;
            font-size: 10px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .meta-value {
            color: #C4D4F0;
            font-size: 13px;
            font-weight: bold;
        }

        #wiki-link {
            display: none;
            color: #4060A0;
            font-size: 11px;
            text-decoration: none;
            letter-spacing: 0.3px;
        }

        #wiki-link:hover { color: #7090C0; text-decoration: underline; }

        #status {
            color: #5080AA;
            font-size: 13px;
            margin-top: 6px;
            text-align: center;
            letter-spacing: 0.5px;
        }

        .nav-side {
            flex-shrink: 0;
            width: 210px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .nav-title {
            color: #8898CC;
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            padding: 4px 0 2px;
            text-align: center;
        }

        #nav-panel {
            background: rgba(5, 8, 28, 0.85);
            border: 1px solid #1A2040;
            border-radius: 10px;
            padding: 8px;
            max-height: 82vh;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        #nav-panel::-webkit-scrollbar { width: 5px; }
        #nav-panel::-webkit-scrollbar-track { background: rgba(10,14,40,0.5); }
        #nav-panel::-webkit-scrollbar-thumb { background: #2A3560; border-radius: 3px; }

        .nav-btn {
            display: block;
            width: 100%;
            padding: 7px 10px;
            border-radius: 6px;
            border: 1px solid transparent;
            font-weight: bold;
            cursor: pointer;
            text-align: left;
            letter-spacing: 1px;
            transition: filter 0.15s, border-color 0.15s;
        }

        .nav-btn:hover { filter: brightness(1.35); }
        .nav-btn:active { filter: brightness(0.85); }

        .planet-btn {
            font-size: 13px;
        }

        .moon-btn {
            font-size: 11px;
            margin-left: 14px;
            width: calc(100% - 14px);
            padding: 4px 8px;
            letter-spacing: 0.5px;
        }

        .nav-active {
            box-shadow: 0 0 0 2px currentColor, 0 0 12px rgba(255,255,255,0.2);
            filter: brightness(1.4);
        }

        .nav-check {
            font-size: 10px;
            opacity: 0.4;
            margin-right: 1px;
        }

        @media (max-width: 700px) {
            .layout {
                flex-direction: column;
                align-items: stretch;
            }

            .canvas-side {
                max-width: 95vw;
            }

            #fact-panel {
                flex-direction: column;
                gap: 8px;
                padding: 10px 14px;
            }

            #fact-header {
                width: 100%;
                flex-direction: row;
                flex-wrap: wrap;
                align-items: center;
                gap: 6px 10px;
            }

            #fact-name {
                font-size: 18px;
                flex: 1;
            }

            #fact-origin {
                display: none;
            }

            #origin-toggle {
                display: inline-block;
                background: rgba(80, 100, 180, 0.3);
                border: 1px solid rgba(100, 130, 220, 0.5);
                color: #AAC0FF;
                padding: 4px 10px;
                border-radius: 6px;
                cursor: pointer;
                font-size: 12px;
                letter-spacing: 0.5px;
                white-space: nowrap;
            }

            #fact-text {
                font-size: 14px;
            }

            .meta-chip {
                padding-right: 10px;
                margin-right: 10px;
            }

            .nav-side {
                width: 100%;
            }

            #nav-panel {
                max-height: 180px;
                flex-direction: row;
                flex-wrap: wrap;
            }

            .nav-btn {
                flex: 0 0 auto;
                width: auto;
            }

            .moon-btn {
                margin-left: 0;
                width: auto;
            }
        }
    </style>
</head>
<body>
    <div class="layout">
        <div class="canvas-side">
            <h1>SPACE EXPLORER</h1>
            <canvas id="game"></canvas>
            <div id="fact-panel">
                <div id="fact-header">
                    <span id="fact-name"></span>
                    <span id="fact-type"></span>
                    <button id="origin-toggle">Origin</button>
                    <div id="fact-origin"></div>
                    <button id="fact-next">Next fact →</button>
                </div>
                <div id="fact-body">
                    <div id="fact-text"></div>
                    <a id="wiki-link" href="#" target="_blank" rel="noopener"></a>
                    <div id="meta-panel"></div>
                </div>
            </div>
            <div id="status">Explored: <span id="visited-count">0</span> objects &mdash; Use nav buttons to travel, or arrow keys / WASD to fly freely</div>
        </div>
        <div class="nav-side">
            <div class="nav-title">Navigate To</div>
            <div id="nav-panel"></div>
        </div>
    </div>
    <script src="fun_facts.js"></script>
    <script src="metadata.js"></script>
    <script src="name_origins.js"></script>
    <script src="space.js"></script>
    <script src="index.js"></script>
</body>
</html>
